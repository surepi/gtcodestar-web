services:
  frontend:
    build:
      context: .
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
        PUBLIC_API_FALLBACK_BASE_URL: ${PUBLIC_API_FALLBACK_BASE_URL:-}
        PUBLIC_API_FETCH_TIMEOUT_MS: ${PUBLIC_API_FETCH_TIMEOUT_MS:-10000}
        PUBLIC_BROWSER_API_BASE_URL: ${PUBLIC_BROWSER_API_BASE_URL:-http://localhost:8080}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:4321}
        PUBLIC_DEFAULT_LANG: ${PUBLIC_DEFAULT_LANG:-en}
        PUBLIC_TURNSTILE_SITE_KEY: ${PUBLIC_TURNSTILE_SITE_KEY:-}
    ports:
      - "4321:80"
    restart: unless-stopped
