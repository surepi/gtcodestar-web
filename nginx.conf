server {
    listen 80;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers applied to every response (static site, no inline auth).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy. Astro islands emit small inline hydration scripts,
    # so script-src allows 'unsafe-inline'; Turnstile is the only third-party
    # script/frame origin. Admin-managed analytics snippets may load HTTPS
    # scripts and beacon endpoints. NOTE: this Docker build serves the browser via a
    # cross-origin API (PUBLIC_BROWSER_API_BASE_URL, e.g. http://localhost:8080), so
    # connect-src must include that backend origin — adjust the value below to match
    # your deployment's API origin if it differs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self' https: http://localhost:8080; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri/index.html $uri $uri/ =404;
    }
}
